<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星学堂 · 打卡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1040 40%, #0d1b3e 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      color: #e0e0e0; padding: 20px;
    }
    .card {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 40px 36px;
      max-width: 440px; width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    h1 { font-size: 24px; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #aab; font-size: 13px; margin-bottom: 28px; }
    .stars { text-align: center; font-size: 20px; margin-bottom: 16px; }
    .input-group { margin-bottom: 16px; }
    .input-group label { display: block; font-size: 13px; color: #aab; margin-bottom: 6px; }
    .input-group input {
      width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3); color: #fff; font-size: 15px; outline: none; transition: border 0.2s;
    }
    .input-group input:focus { border-color: #f0b429; }
    .input-group input::placeholder { color: #667; }
    .btn-group { display: flex; gap: 12px; margin-top: 24px; }
    .btn {
      flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-decoration: none; text-align: center; display: block;
    }
    .btn-primary { background: linear-gradient(135deg, #f0b429, #e8962e); color: #1a1040; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(240,180,41,0.3); }
    .btn-secondary { background: rgba(255,255,255,0.08); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.12); }
    .btn-secondary:hover { background: rgba(255,255,255,0.14); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
    .msg { text-align: center; font-size: 13px; margin-top: 16px; min-height: 20px; transition: all 0.3s; }
    .msg.success { color: #4ade80; }
    .msg.error { color: #f87171; }
    .footer { text-align: center; margin-top: 20px; font-size: 11px; color: #556; }
  </style>
</head>
<body>
<div class="card">
  <div class="stars">✨ 🌟 ✨</div>
  <h1>星学堂 · 每日打卡</h1>
  <p class="subtitle">星河智善 · 选择你的学习旅程</p>

  <div class="input-group">
    <label>姓名</label>
    <input type="text" id="input-name" placeholder="请输入姓名" maxlength="10" autocomplete="name">
  </div>
  <div class="input-group">
    <label>部门</label>
    <input type="text" id="input-dept" placeholder="请输入部门名称（如：品质管理部）" maxlength="20" autocomplete="organization">
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="btn-shiwuwu" onclick="goCheckin('shiwuwu')">🏔️ 十五五闯关</button>
    <button class="btn btn-secondary" id="btn-training" onclick="goCheckin('training')">📚 新员工培训</button>
  </div>

  <div class="msg" id="msg"></div>
  <div class="footer">🏔️ 星河智善 · 星途行动</div>
</div>

<script>
async function goCheckin(type) {
  const name = document.getElementById('input-name').value.trim();
  const dept = document.getElementById('input-dept').value.trim();
  const msg = document.getElementById('msg');
  const btn1 = document.getElementById('btn-shiwuwu');
  const btn2 = document.getElementById('btn-training');

  if (!name) { msg.className = 'msg error'; msg.textContent = '请填写姓名！'; return; }
  if (!dept) { msg.className = 'msg error'; msg.textContent = '请填写部门！'; return; }

  btn1.disabled = true; btn2.disabled = true;
  msg.className = 'msg'; msg.textContent = '⏳ 打卡中...';

  try {
    // 记录打卡到服务器
    const res = await fetch('/api/daka/checkin/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, department: dept, phone: '' })
    });
    const data = await res.json();
    if (!data.success) { throw new Error(data.error || '打卡失败'); }
    
    msg.className = 'msg success';
    msg.textContent = '✅ ' + (data.message || '打卡成功！');

    // 保存用户信息到 localStorage（供游戏页面读取）
    localStorage.setItem('xa_user', JSON.stringify({ name, dept, phone: '', days: {} }));

    // 跳转到对应页面
    setTimeout(() => {
      if (type === 'shiwuwu') {
        window.location.href = '/?player=' + encodeURIComponent(name);
      } else {
        window.location.href = '/training/?player=' + encodeURIComponent(name);
      }
    }, 800);
  } catch (e) {
    msg.className = 'msg error';
    msg.textContent = '❌ ' + e.message;
    btn1.disabled = false; btn2.disabled = false;
  }
}
</script>
</body>
</html>
