<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星河智善 · 十五五星途行动</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans SC",sans-serif;
  background:linear-gradient(160deg,#0a0e27 0%,#1a1040 30%,#0d0d2b 60%,#0a0a1e 100%);
  color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center
}
.container{max-width:420px;width:100%;padding:30px 20px 50px;text-align:center;position:relative}

.badge{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,rgba(212,168,67,.15),rgba(231,76,60,.08));
  border:1px solid rgba(212,168,67,.25);padding:6px 18px;border-radius:20px;
  font-size:11px;color:#f0d078;letter-spacing:1px;margin-bottom:16px
}
.logo-icon{
  width:56px;height:56px;margin:0 auto 12px;
  background:linear-gradient(135deg,#d4a843,#b8922f);border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:28px;
  box-shadow:0 0 30px rgba(212,168,67,.25)
}
h1{font-size:30px;font-weight:900;line-height:1.2;margin-bottom:6px}
h1 .hl{background:linear-gradient(135deg,#f0d078,#e74c3c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sub{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:24px;line-height:1.6}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 8px}
.card .n{font-size:28px;font-weight:900;background:linear-gradient(135deg,#f0d078,#d4a843);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.card .l{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}

.target{
  background:linear-gradient(135deg,rgba(124,58,237,.12),rgba(0,212,255,.08));
  border:1px solid rgba(124,58,237,.2);border-radius:12px;padding:16px;margin-bottom:20px
}
.target .t1{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-bottom:6px}
.target .t2{font-size:18px;font-weight:700;color:#f0d078}

.qr-box{
  display:inline-block;background:#fff;border-radius:14px;padding:12px;margin-bottom:8px;
  box-shadow:0 0 30px rgba(212,168,67,.15)
}
.qr-box img{display:block;width:160px;height:160px;border-radius:6px}
.qr-lb{font-size:10px;color:rgba(255,255,255,.4);margin-bottom:20px}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:14px 40px;border-radius:25px;font-size:16px;font-weight:700;border:none;
  background:linear-gradient(135deg,#b8922f,#d4a843);color:#0a0e27;
  cursor:pointer;font-family:inherit;text-decoration:none;
  box-shadow:0 4px 20px rgba(212,168,67,.3);margin-bottom:4px
}
.btn:active{transform:scale(.97)}

.feat{display:flex;flex-direction:column;gap:8px;margin-bottom:0}
.f{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);border-radius:8px;padding:10px 14px;text-align:left;font-size:12px}
.f .ic{font-size:18px;width:26px;text-align:center}
.f .t{color:rgba(255,255,255,.7);line-height:1.4}
.ft{font-size:9px;color:rgba(255,255,255,.25);margin-top:16px;line-height:1.8}
</style>
</head>
<body>
<div class="container">
  <div class="badge">🏆 星河智善生活 · 全员行动</div>
  <div class="logo-icon">🗺️</div>
  <h1>星途<span class="hl">奋进</span></h1>
  <div style="font-size:14px;font-weight:700;color:rgba(255,255,255,.9);margin-bottom:4px">十五五 · 知识行动</div>
  <div class="sub">凝星河之力 · 赴智善之约<br>三十天，三十项知识修炼</div>

  <div class="grid">
    <div class="card"><div class="n">30</div><div class="l">闯关天数</div></div>
    <div class="card"><div class="n">150</div><div class="l">知识要点</div></div>
    <div class="card"><div class="n">150</div><div class="l">闯关考题</div></div>
    <div class="card"><div class="n">6</div><div class="l">主题篇章</div></div>
  </div>

  <div class="target">
    <div class="t1">📋 参与对象</div>
    <div class="t2">经理级及以上管理人员</div>
  </div>

  <div class="qr-box">
    <img src="/api/checkin/qrcode/" alt="扫码进入">
  </div>
  <div class="qr-lb">📱 微信扫码 · 即刻闯关</div>

  <a class="btn" href="/checkin/" target="_blank">🚀 开始闯关</a>
  <div style="font-size:10px;color:rgba(255,255,255,.3);margin-bottom:20px">或复制链接到浏览器打开</div>

  <div class="feat">
    <div class="f"><span class="ic">📖</span><span class="t">每天5个知识点 + 5道闯关考题，3分钟完成</span></div>
    <div class="f"><span class="ic">❤️</span><span class="t">HP生命值系统，答错扣命，答对4题通关</span></div>
    <div class="f"><span class="ic">🏆</span><span class="t">智善精英榜排名，部门PK，比学赶超</span></div>
    <div class="f"><span class="ic">🗓️</span><span class="t">每周设截止日期，逾期自动催办提醒</span></div>
  </div>

  <div class="ft">星河智善生活 · 十五五星途行动 · 2026<br>让学习成为一种习惯</div>
</div>
</body>
</html>
