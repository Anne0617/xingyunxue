<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>星河智善2026年第二期新员工入职培训</title>
<script src="https://cdn.tailwindcss.com">
</script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1">
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Noto Sans SC', sans-serif; overflow-x: hidden; }
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite; }
@keyframes twinkle { 0%,100% { opacity:0.3;transform:scale(1); } 50% { opacity:1;transform:scale(1.3); } }
@keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
@keyframes slideUp { from { opacity:0;transform:translateY(30px); } to { opacity:1;transform:translateY(0); } }
@keyframes glow { 0%,100% { box-shadow:0 0 10px rgba(245,158,11,0.3); } 50% { box-shadow:0 0 25px rgba(245,158,11,0.6); } }
@keyframes pulse-ring { 0% { transform:scale(0.95);opacity:1; } 100% { transform:scale(1.3);opacity:0; } }
@keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
.shimmer { background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent); background-size:200% 100%; animation:shimmer 3s infinite; }
.game-container { position:relative; z-index:1; min-height:100vh; }
.level-panel { animation:slideUp 0.5s ease-out; }
.node-dot { transition:all 0.3s ease; }
.node-dot.completed { background:linear-gradient(135deg,#10b981,#059669); box-shadow:0 0 15px rgba(16,185,129,0.5); }
.node-dot.current { background:linear-gradient(135deg,#f59e0b,#d97706); box-shadow:0 0 20px rgba(245,158,11,0.5); animation:glow 2s infinite; }
.node-dot.locked { background:rgba(255,255,255,0.1); }
.connector { width:3px; height:40px; transition:all 0.5s ease; }
.connector.active { background:linear-gradient(180deg,#10b981,#059669); }
.connector.inactive { background:rgba(255,255,255,0.1); }
@keyframes rocketFly { 0% { transform:translateY(0) rotate(-45deg); } 50% { transform:translateY(-20px) rotate(-45deg); } 100% { transform:translateY(0) rotate(-45deg); } }
.rocket { animation:rocketFly 2s ease-in-out infinite; }
.exam-option { transition:all 0.2s ease; }
.exam-option:hover { background:rgba(245,158,11,0.15); }
.exam-option.selected { background:rgba(245,158,11,0.25); border-color:#f59e0b; }
.exam-option.correct { background:rgba(16,185,129,0.25); border-color:#10b981; }
.exam-option.wrong { background:rgba(239,68,68,0.25); border-color:#ef4444; }
.star-rating { cursor:pointer; transition:all 0.2s; }
.star-rating:hover { transform:scale(1.2); }
.certificate-card { background:linear-gradient(135deg,rgba(245,158,11,0.05),rgba(239,68,68,0.05)); border:2px solid rgba(245,158,11,0.3); }
</style>
</head>
<body class="bg-[#0a0a1a] text-white min-h-screen">

<div class="stars" id="stars"></div>

<div class="game-container max-w-lg mx-auto px-4 pb-12">
  <!-- Header -->
  <div class="text-center pt-6 pb-4 relative z-10">
    <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-amber-500/10 border border-amber-500/20 text-amber-400 text-xs tracking-wider mb-3">
      <span>✦</span> 星河智善生活集团 · 人力行政中心 <span>✦</span>
    </div>
    <h1 class="text-3xl font-black bg-gradient-to-r from-amber-300 via-amber-400 to-orange-400 bg-clip-text text-transparent">
      星河智善
    </h1>
    
  </div>

  <!-- Progress Bar -->
  <div class="relative z-10 mb-6 px-2">
    <div class="flex justify-between items-center mb-2">
      <span class="text-xs text-white/40">闯关进度</span>
      <span class="text-xs text-amber-400 font-bold" id="progressText">0%</span>
    </div>
    <div class="w-full h-2 rounded-full bg-white/5 overflow-hidden">
      <div id="progressBar" class="h-full rounded-full bg-gradient-to-r from-amber-500 to-orange-500 transition-all duration-700 ease-out" style="width:0%"></div>
    </div>
  </div>

  <!-- Star Map (Navigation) -->
  <div class="relative z-10 mb-8 flex flex-col items-center" id="starMap">
    <!-- Nodes generated by JS -->
  </div>

  <!-- Level Content Panels -->
  <div class="relative z-10" id="levelContent">
    <!-- Rendered by JS -->
  </div>
</div>

<script>
// ====== GAME DATA ======
const LEVELS = [
  {
    id:1, name:'星河启航', emoji:'🪐', type:'signin',
    title:'第1关 · 星河启航',
    desc:'请填写你的个人信息，开启在星河智善的成长之旅。'
  },
  {
    id:2, name:'星河讲堂', emoji:'⚡', type:'lecture',
    title:'第2关 · 星河讲堂',
    desc:'加入培训课堂，聆听星河智善的发展历程与企业文化。请加入腾讯会议完成听课。'
  },
  {
    id:3, name:'星河感悟', emoji:'🔓', type:'evaluation',
    title:'第3关 · 星河感悟',
    desc:'分享你的培训感受，为后续学习积累宝贵经验。'
  },
  {
    id:4, name:'星河论剑', emoji:'🎯', type:'exam',
    title:'第4关 · 星河论剑',
    desc:'终极考验！20道企业文化考题，答对16题以上即可通关。'
  },
  {
    id:5, name:'星河荣耀', emoji:'🏆', type:'certificate',
    title:'第5关 · 星河荣耀',
    desc:'恭喜抵达终点！你的努力值得被铭记。'
  }
];

// ====== QUESTIONS ======
const QUESTIONS = [
  // 单选 1-10
  {id:1,type:'single',q:'星河控股集团成立于哪一年？',opts:['1979年','1988年','1992年','2000年'],ans:1},
  {id:2,type:'single',q:'星河的愿景是什么？',opts:['城市运营引领者','中国领先物业','全球500强','品质生活创造者'],ans:0},
  {id:3,type:'single',q:'"星河要做五百年，争做五百强"体现了什么？',opts:['短期目标','长期发展愿景','营销口号','财务指标'],ans:1},
  {id:4,type:'single',q:'四大核心价值观中最基础的是？',opts:['创新','责任','共赢','诚信'],ans:3},
  {id:5,type:'single',q:'三大特色文化不包括以下哪项？',opts:['佛文化','酒文化','狼文化','家文化'],ans:2},
  {id:6,type:'single',q:'"我是星河第一服务员"最早是在哪里提出的？',opts:['星河世纪','星河丹堤','星河国际','星河WORLD'],ans:1},
  {id:7,type:'single',q:'星河的社会责任理念是什么？',opts:['回馈社会勇于担当','做点事给社会看、给家人看、给亲戚朋友看','创造就业奉献爱心','绿色环保可持续发展'],ans:1},
  {id:8,type:'single',q:'"三不欠"原则指什么？',opts:['不欠供应商、客户、股东','不欠国家税收、银行利息、员工工资','不欠租金、物业费、水电费','不欠贷款、债券、股息'],ans:1},
  {id:9,type:'single',q:'星河"三驾马车"指什么？',opts:['住宅、商业、文旅','地产、商业、金融投资','物业、酒店、教育','深圳、广州、惠州'],ans:1},
  {id:10,type:'single',q:'"先优化、抢人才、强机制、调结构、树正气、控风险"是？',opts:['六项禁令','十八字方针','核心价值观','企业文化大纲'],ans:1},
  // 多选 11-15
  {id:11,type:'multi',q:'星河的四大核心价值观包括？（多选）',opts:['诚信','责任','创新','共赢','效率'],ans:[0,1,2,3]},
  {id:12,type:'multi',q:'星河的三大特色文化是？（多选）',opts:['佛文化','酒文化','茶文化','家文化','武文化'],ans:[0,1,3]},
  {id:13,type:'multi',q:'星河"清退五种人"包括？（多选）',opts:['坏人','贪人','懒人','庸人','闲人'],ans:[0,1,2,3]},
  {id:14,type:'multi',q:'"第一服务员"的对应关系正确的是？（多选）',opts:['我=诚信责任','第一=精进创新','服务员=协同共赢','我=积极进取'],ans:[0,1,2]},
  {id:15,type:'multi',q:'以下哪些是星河核心行为指导？（多选）',opts:['我是星河第一服务员','服务创造价值','利润第一','规模为王'],ans:[0,1]},
  // 判断 16-20
  {id:16,type:'judge',q:'星河只做房地产开发。',opts:['正确','错误'],ans:1},
  {id:17,type:'judge',q:'诚信是星河最重要的价值观。',opts:['正确','错误'],ans:0},
  {id:18,type:'judge',q:'"第一服务员"是星河最具特色的文化建设品牌。',opts:['正确','错误'],ans:0},
  {id:19,type:'judge',q:'佛文化意味着每个员工必须信仰佛教。',opts:['正确','错误'],ans:1},
  {id:20,type:'judge',q:'星河的核心使命是"创想无界，心筑未来"。',opts:['正确','错误'],ans:0}
];

// ====== STORAGE ======
function getProgress() {
  try {
    const p = localStorage.getItem('xingchen_progress');
    return p ? JSON.parse(p) : {currentLevel:1,completed:{},user:{name:'',employeeId:'',department:''},evaluation:{},examScore:0};
  } catch { return {currentLevel:1,completed:{},user:{name:'',employeeId:'',department:''},evaluation:{},examScore:0}; }
}
function saveProgress(p) { localStorage.setItem('xingchen_progress',JSON.stringify(p)); }

// ====== STARS BG ======
function createStars() {
  const c = document.getElementById('stars');
  for(let i=0;i<80;i++) {
    const s=document.createElement('div');
    s.className='star';
    s.style.left=Math.random()*100+'%';
    s.style.top=Math.random()*100+'%';
    const sz=Math.random()*2.5+0.5;
    s.style.width=sz+'px'; s.style.height=sz+'px';
    s.style.setProperty('--d',(Math.random()*3+2)+'s');
    s.style.animationDelay=Math.random()*5+'s';
    c.appendChild(s);
  }
}
createStars();

// ====== RENDER ======
function render() {
  const p = getProgress();
  const total = LEVELS.length;
  const completedCount = Object.keys(p.completed).length;
  const pct = Math.round((completedCount/total)*100);

  document.getElementById('progressText').textContent = pct + '%';
  document.getElementById('progressBar').style.width = pct + '%';

  const mapEl = document.getElementById('starMap');
  mapEl.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const status = p.completed[lv.id] ? 'completed' : (lv.id === p.currentLevel ? 'current' : 'locked');
    const wrapper = document.createElement('div');
    wrapper.className = 'flex flex-col items-center';
    wrapper.innerHTML = `
      <div class="node-dot ${status} w-14 h-14 rounded-full flex items-center justify-center cursor-pointer transition-all duration-300" data-level="${lv.id}">
        ${status==='completed' ? '<svg class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>'
        : status==='current' ? '<span class="text-lg">🚀</span>'
        : '<svg class="w-5 h-5 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0h-2m2-4a4 4 0 100-8 4 4 0 000 8z"/></svg>'}
      </div>
      <div class="text-xs mt-1.5 font-medium ${status==='completed'?'text-emerald-400':status==='current'?'text-amber-400':'text-white/30'}">${lv.emoji} ${lv.name}</div>
      <div class="text-[10px] ${status==='completed'?'text-emerald-400/60':status==='current'?'text-amber-400/60':'text-white/20'}">
        ${status==='completed'?'已通关':status==='current'?'进行中':'未解锁'}
      </div>
    `;
    mapEl.appendChild(wrapper);

    // connector
    if(i < total-1) {
      const conn = document.createElement('div');
      conn.className = `connector ${p.completed[lv.id]?'active':'inactive'}`;
      mapEl.appendChild(conn);
    }

    // click handler - can click completed or current
    wrapper.querySelector('.node-dot').addEventListener('click',() => {
      if(status !== 'locked') enterLevel(lv.id);
    });
  });

  // Render current level content
  renderLevel(p.currentLevel, p);
}

function renderLevel(levelId, p) {
  const lv = LEVELS.find(l => l.id === levelId);
  if(!lv) return;
  const el = document.getElementById('levelContent');
  const status = p.completed[lv.id] ? 'completed' : (lv.id === p.currentLevel ? 'current' : 'locked');

  if(status === 'locked') {
    el.innerHTML = `<div class="text-center py-20 text-white/30"><p class="text-6xl mb-4">🔒</p><p>请先完成上一关</p></div>`;
    return;
  }

  let html = '';
  switch(lv.type) {
    case 'signin': html = renderSignin(lv, p); break;
    case 'lecture': html = renderLecture(lv, p); break;
    case 'evaluation': html = renderEvaluation(lv, p); break;
    case 'exam': html = renderExam(lv, p); break;
    case 'certificate': html = renderCertificate(lv, p); break;
  }
  el.innerHTML = html;

  // Bind handlers
  if(lv.type === 'signin') bindSignin(lv, p);
  else if(lv.type === 'lecture') bindLecture(lv, p);
  else if(lv.type === 'evaluation') bindEvaluation(lv, p);
  else if(lv.type === 'exam') bindExam(lv, p);
}

// ====== LEVEL 1: SIGNIN ======
function renderSignin(lv, p) {
  return `
  <div class="level-panel bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-3xl">🪐</span>
      <div>
        <h2 class="text-xl font-bold text-amber-400">${lv.title}</h2>
        <p class="text-xs text-white/40">${lv.desc}</p>
      </div>
    </div>
    <div class="space-y-4 mt-6">
      <div>
        <label class="block text-xs text-white/50 mb-1.5">姓名</label>
        <input id="signinName" type="text" value="${p.user.name}" placeholder="请输入你的姓名" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 focus:border-amber-500/50 focus:outline-none transition-all text-sm">
      </div>
      <div>
        <label class="block text-xs text-white/50 mb-1.5">工号
      </div>
      <div>
        <label class="block text-xs text-white/50 mb-1.5">部门名称</label>
        <input id="signinDept" type="text" value="${p.user.department}" placeholder="请输入你的部门名称" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 focus:border-amber-500/50 focus:outline-none transition-all text-sm"></label>
        <input id="signinEmpId" type="text" value="${p.user.employeeId}" placeholder="请输入你的工号" class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 focus:border-amber-500/50 focus:outline-none transition-all text-sm">
      </div>
      <button id="signinBtn" class="w-full py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-black hover:from-amber-400 hover:to-orange-400 transition-all active:scale-[0.98]">
        🚀 启程，前往星际
      </button>
    </div>
  </div>`;
}
function bindSignin(lv, p) {
  document.getElementById('signinBtn').addEventListener('click',() => {
    const name = document.getElementById('signinName').value.trim();
    const empId = document.getElementById('signinEmpId').value.trim();
    const dept = document.getElementById('signinDept').value.trim();
    if(!name) { return showToast('请填写姓名','error'); }
    if(!empId) { return showToast('请填写工号','error'); }
    if(!dept) { return showToast('请填写部门名称','error'); }
    p.user = {name, employeeId: empId, department: dept};
    p.completed[lv.id] = true;
    p.currentLevel = lv.id + 1;
    saveProgress(p);
    showToast('入职登记成功！','success');
    render();
  });
}

// ====== LEVEL 2: LECTURE ======
function renderLecture(lv, p) {
  return `
  <div class="level-panel bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-3xl">⚡</span>
      <div>
        <h2 class="text-xl font-bold text-amber-400">${lv.title}</h2>
        <p class="text-xs text-white/40">${lv.desc}</p>
      </div>
    </div>
    <div class="mt-6 space-y-4">
      <div class="bg-amber-500/5 rounded-xl border border-amber-500/10 p-4 text-center">
        <p class="text-xs text-white/40 mb-2">腾讯会议号</p>
        <p class="text-3xl font-black text-amber-400 tracking-widest">576-553-473</p>
        <p class="text-[10px] text-white/20 mt-2">请使用腾讯会议加入课堂完成听课</p>
      </div>
      <div class="flex gap-2">
        <a href="https://meeting.tencent.com/dm/${encodeURIComponent('576553473')}" target="_blank" class="flex-1 py-3 rounded-xl font-bold text-sm bg-blue-600 hover:bg-blue-500 text-white text-center transition-all">💻 加入腾讯会议</a>
        <button id="lectureDone" class="flex-1 py-3 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-black hover:from-amber-400 hover:to-orange-400 transition-all active:scale-[0.98]">
          ✅ 已完成听课
        </button>
      </div>
    </div>
  </div>`;
}
function bindLecture(lv, p) {
  document.getElementById('lectureDone').addEventListener('click',() => {
    p.completed[lv.id] = true;
    p.currentLevel = lv.id + 1;
    saveProgress(p);
    showToast('课堂学习完成！','success');
    render();
  });
}

// ====== LEVEL 3: EVALUATION ======
function renderEvaluation(lv, p) {
  const ev = p.evaluation || {};
  const helpfulOpts = ["公司规章制度","企业文化发展","岗位职责说明","行政后勤福利","安全规范要求"];
  const issueOpts = ["无任何问题","网络卡顿","声音画面模糊","课件看不清","会议通知不及时"];
  const starLabels = ["本次线上培训整体满意度","腾讯会议线上授课流畅度","课程内容贴合岗位需求程度","讲师讲解清晰易懂程度","培训时长安排合理性"];
  const starKeys = ["satisfaction","streaming","relevance","clarity","duration"];
  return `
  <div class="level-panel bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-3xl">\ud83d\udca1</span>
      <div>
        <h2 class="text-xl font-bold text-amber-400">${lv.title}</h2>
        <p class="text-xs text-white/40">请认真填写培训评估问卷，帮助我们持续改进</p>
      </div>
    </div>
    <div class="mt-6 space-y-5 divide-y divide-white/5">
      <!-- Star Ratings -->
      <div class="pb-4">
        <h3 class="text-sm font-bold text-white/80 mb-4 flex items-center gap-2"><span>\u2b50</span> 培训整体评分（满分 5 星）</h3>
        ${starKeys.map((key, idx) => `
          <div class="mb-3">
            <label class="block text-xs text-white/50 mb-1.5">${starLabels[idx]}（1 很差 / 5 极好）</label>
            <div class="flex gap-2 text-2xl starGroup" data-key="${key}">
              ${[1,2,3,4,5].map(i => `<span class="star-rating ${(ev[key]||0)>=i?"text-amber-400":"text-white/20"}" data-idx="${i}">\u2b50</span>`).join("")}
            </div>
          </div>`).join("")}
      </div>

      <!-- Helpful Content -->
      <div class="py-4">
        <h3 class="text-sm font-bold text-white/80 mb-3 flex items-center gap-2"><span>\ud83d\udccb</span> 课程内容评价（多选）</h3>
        <p class="text-[10px] text-white/30 mb-3">本次培训对你最有帮助的内容</p>
        <div class="space-y-2" id="helpfulGroup">
          ${helpfulOpts.map((opt, i) => `
          <label class="flex items-center gap-2.5 py-2 px-3 rounded-lg border border-white/5 hover:border-white/10 cursor-pointer transition-all ${(ev.helpful||[]).includes(i)?"border-amber-500/30 bg-amber-500/5":""}">
            <input type="checkbox" value="${i}" ${(ev.helpful||[]).includes(i)?"checked":""} class="accent-amber-500">
            <span class="text-sm text-white/70">${opt}</span>
          </label>`).join("")}
          <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-white/30">其他</span>

        </div>

      <div class="py-4">

        <p class="text-[10px] text-white/30 mb-3">线上参训遇到的问题</p>
        <div class="space-y-2" id="issueGroup">

        <textarea id="improveSug" rows="3" placeholder="请填写你的建议..." class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 focus:border-amber-500/50 focus:outline-none text-sm resize-none">${ev.improveSug||""}</textarea>

        <textarea id="learningGain" rows="3" placeholder="请分享你的培训收获..." class="w-full px-4 py-3 rounded-xl bg-white/5 border border-white/10 text-white placeholder-white/20 focus:border-amber-500/50 focus:outline-none text-sm resize-none">${ev.learningGain||""}</textarea>
      </div>

      <div class="pt-4">
        <button id="evalBtn" class="w-full py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-black hover:from-amber-400 hover:to-orange-400 transition-all active:scale-[0.98]">
          \ud83d\udd13 提交评估，进入下一关

}

function bindEvaluation(lv, p) {
  // Star ratings
  document.querySelectorAll(".starGroup").forEach(group => {
    const key = group.dataset.key;
    group.querySelectorAll(".star-rating").forEach(el => {
      el.addEventListener("click", () => {
        const idx = parseInt(el.dataset.idx);
        if (!p.evaluation) p.evaluation = {};
        p.evaluation[key] = idx;
        saveProgress(p);
        renderLevel(lv.id, getProgress());
      });
    });
  });

  // Helpful checkboxes
  const hg = document.getElementById("helpfulGroup");
  if (hg) {
    hg.addEventListener("change", () => {
      if (!p.evaluation) p.evaluation = {};
      const checked = Array.from(hg.querySelectorAll('input[type="checkbox"]:checked')).map(c => parseInt(c.value));
      p.evaluation.helpful = checked;
      saveProgress(p);
    });
    const ho = document.getElementById("helpfulOther");
    if (ho) ho.addEventListener("input", () => {
      if (!p.evaluation) p.evaluation = {};
      p.evaluation.helpfulOther = ho.value;
      saveProgress(p);
    });
  }

  // Issue type radio
  const ig = document.getElementById("issueGroup");
  if (ig) {
    ig.addEventListener("change", () => {
      if (!p.evaluation) p.evaluation = {};
      const checked = ig.querySelector('input[type="radio"]:checked');
      if (checked) p.evaluation.issueType = parseInt(checked.value);
      saveProgress(p);
    });
    const id = document.getElementById("issueDetail");
    if (id) id.addEventListener("input", () => {
      if (!p.evaluation) p.evaluation = {};
      p.evaluation.issueDetail = id.value;
      saveProgress(p);
    });
  }

  // Improvement suggestions
  const im = document.getElementById("improveSug");
  if (im) im.addEventListener("input", () => {
    if (!p.evaluation) p.evaluation = {};
    p.evaluation.improveSug = im.value;
    saveProgress(p);
  });

  // Learning gains
  const lg = document.getElementById("learningGain");
  if (lg) lg.addEventListener("input", () => {
    if (!p.evaluation) p.evaluation = {};
    p.evaluation.learningGain = lg.value;
    saveProgress(p);
  });

  // Submit
  document.getElementById("evalBtn").addEventListener("click", () => {
    const ev = p.evaluation || {};
    let missing = [];
    if (!ev.satisfaction) missing.push("整体满意度");
    if (!ev.streaming) missing.push("授课流畅度");
    if (!ev.relevance) missing.push("内容贴合度");
    if (!ev.clarity) missing.push("讲师清晰度");
    if (!ev.duration) missing.push("时长合理性");
    if (missing.length > 0) return showToast("请完成全部星级评分：" + missing.join("、"), "error");
    p.completed[lv.id] = true;
    p.currentLevel = lv.id + 1;
    saveProgress(p);
    showToast("评估完成！星河论剑已解锁", "success");
    render();
  });
}
// ====== LEVEL 4: EXAM ======
let examState = { answers:{}, submitted:false, score:0 };

function renderExam(lv, p) {
  const state = examState;
  // Check if already passed
  const examData = p.completed['exam_data'];
  if(examData && examData.passed) {
    return `
    <div class="level-panel bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6 text-center">
      <span class="text-5xl block mb-4">🎉</span>
      <h2 class="text-xl font-bold text-emerald-400 mb-2">考试已通过</h2>
      <p class="text-white/60">得分：${examData.score}/${QUESTIONS.length}</p>
    </div>`;
  }
  return `
  <div class="level-panel bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
    <div class="flex items-center gap-3 mb-4">
      <span class="text-3xl">🎯</span>
      <div>
        <h2 class="text-xl font-bold text-amber-400">${lv.title}</h2>
        <p class="text-xs text-white/40">共 ${QUESTIONS.length} 题 · 答对 16 题（80%）及格</p>
      </div>
    </div>
    <div class="mt-4 space-y-1 text-xs text-white/30">
      <span class="inline-block mr-3">📝 单选 1-10（10题）</span>
      <span class="inline-block mr-3">📑 多选 11-15（5题）</span>
      <span class="inline-block">⚖️ 判断 16-20（5题）</span>
    </div>
    <div id="examQuestions" class="mt-4 space-y-3">
      ${QUESTIONS.map((q,idx) => {
        const a = state.answers[q.id];
        const isCorrect = state.submitted && (Array.isArray(q.ans)
          ? JSON.stringify((a||[]).sort()) === JSON.stringify((q.ans||[]).sort())
          : a === q.ans);
        const isWrong = state.submitted && !isCorrect;
        return `
        <div class="exam-option p-3 rounded-xl border ${state.submitted?(isCorrect?'border-emerald-500/30 bg-emerald-500/5':'border-red-500/30 bg-red-500/5'):'border-white/5 bg-white/5'} transition-all">
          <div class="text-xs font-medium text-white/50 mb-1">
            ${q.type==='multi'?'📑 多选题':q.type==='judge'?'⚖️ 判断题':'📝 单选题'}
            <span class="float-right">${idx+1}/${QUESTIONS.length}</span>
          </div>
          <div class="text-sm mb-2">${q.q}</div>
          <div class="space-y-1">
            ${q.opts.map((opt,oi) => {
              if(q.type === 'judge') {
                const sel = a === oi;
                return `<label class="flex items-center gap-2 py-1 px-2 rounded-lg cursor-pointer ${sel?(isCorrect?'text-emerald-400':'text-red-400'):'text-white/60'} hover:bg-white/5 ${state.submitted?'pointer-events-none':''}">
                  <input type="radio" name="q${q.id}" value="${oi}" ${sel?'checked':''} ${state.submitted?'disabled':''} class="accent-amber-500">
                  <span class="text-sm">${opt}</span>
                </label>`;
              }
              if(q.type === 'multi') {
                const arr = a || [];
                const sel = arr.includes(oi);
                return `<label class="flex items-center gap-2 py-1 px-2 rounded-lg cursor-pointer ${sel?(isCorrect?'text-emerald-400':'text-red-400'):'text-white/60'} hover:bg-white/5 ${state.submitted?'pointer-events-none':''}">
                  <input type="checkbox" name="q${q.id}" value="${oi}" ${sel?'checked':''} ${state.submitted?'disabled':''} class="accent-amber-500">
                  <span class="text-sm">${opt}</span>
                </label>`;
              }
              const sel = a === oi;
              return `<label class="flex items-center gap-2 py-1 px-2 rounded-lg cursor-pointer ${sel?(isCorrect?'text-emerald-400':'text-red-400'):'text-white/60'} hover:bg-white/5 ${state.submitted?'pointer-events-none':''}">
                <input type="radio" name="q${q.id}" value="${oi}" ${sel?'checked':''} ${state.submitted?'disabled':''} class="accent-amber-500">
                <span class="text-sm">${opt}</span>
              </label>`;
            }).join('')}
          </div>
          ${state.submitted ? `<div class="text-xs mt-1 ${isCorrect?'text-emerald-400':'text-red-400'}">${isCorrect?'✅ 正确':'❌ 错误'}</div>` : ''}
        </div>`;
      }).join('')}
    </div>
    ${!state.submitted ? `
    <button id="examSubmit" class="w-full mt-4 py-3.5 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-black hover:from-amber-400 hover:to-orange-400 transition-all active:scale-[0.98]">
      📤 提交答卷
    </button>` : `
    <div class="mt-4 text-center">
      <div class="text-2xl font-black ${state.score >= 16 ? 'text-emerald-400' : 'text-red-400'}">
        ${state.score} / ${QUESTIONS.length}
      </div>
      <div class="text-sm text-white/50 mt-1">${state.score >= 16 ? '🎉 恭喜通过！' : '未达到 80 分及格线'}</div>
      ${state.score >= 16 ? `
      <button id="examPass" class="mt-3 py-3 px-8 rounded-xl font-bold text-sm bg-gradient-to-r from-emerald-500 to-green-500 text-white hover:from-emerald-400 hover:to-green-400 transition-all">
        🏆 进入星河荣耀
      </button>` : `
      <button id="examRetry" class="mt-3 py-3 px-8 rounded-xl font-bold text-sm bg-gradient-to-r from-amber-500 to-orange-500 text-black hover:from-amber-400 hover:to-orange-400 transition-all">
        🔄 重新答题
      </button>`}
    </div>`}
  </div>`;
}

function bindExam(lv, p) {
  const state = examState;
  state.submitted = false;
  state.answers = {};
  state.score = 0;

  // Listen for answer changes
  function collectAnswers() {
    const ans = {};
    QUESTIONS.forEach(q => {
      if(q.type === 'multi') {
        const checked = document.querySelectorAll(`input[name="q${q.id}"]:checked`);
        ans[q.id] = Array.from(checked).map(c => parseInt(c.value)).sort();
      } else {
        const checked = document.querySelector(`input[name="q${q.id}"]:checked`);
        ans[q.id] = checked !== null ? parseInt(checked.value) : undefined;
      }
    });
    state.answers = ans;
  }

  document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => {
    el.addEventListener('change', collectAnswers);
  });

  const submitBtn = document.getElementById('examSubmit');
  if(submitBtn) {
    submitBtn.addEventListener('click',() => {
      collectAnswers();
      // Check all answered
      let allAnswered = true;
      QUESTIONS.forEach(q => {
        if(state.answers[q.id] === undefined || state.answers[q.id] === null || (Array.isArray(state.answers[q.id]) && state.answers[q.id].length === 0)) {
          allAnswered = false;
        }
      });
      if(!allAnswered) return showToast('请回答所有题目后再提交','error');

      // Grade
      let score = 0;
      QUESTIONS.forEach(q => {
        const a = state.answers[q.id];
        const correct = Array.isArray(q.ans)
          ? JSON.stringify((a||[]).sort()) === JSON.stringify((q.ans||[]).sort())
          : a === q.ans;
        if(correct) score++;
      });
      state.score = score;
      state.submitted = true;
      saveProgress(p);
      renderLevel(lv.id, getProgress());
      if(score < 16) showToast('未达到80分及格线，请重新答题','error');
      else {
        showToast('🎉 恭喜通过考试！','success');
        // Re-bind the pass/retry buttons
        setTimeout(() => bindExam(lv, getProgress()), 100);
      }
    });
  }

  const passBtn = document.getElementById('examPass');
  if(passBtn) {
    passBtn.addEventListener('click',() => {
      p.completed[lv.id] = true;
      p.completed['exam_data'] = { score: state.score, total: QUESTIONS.length, passed: true };
      p.currentLevel = lv.id + 1;
      saveProgress(p);
      render();
    });
  }

  const retryBtn = document.getElementById('examRetry');
  if(retryBtn) {
    retryBtn.addEventListener('click',() => {
      state.answers = {};
      state.submitted = false;
      state.score = 0;
      renderLevel(lv.id, getProgress());
    });
  }
}

// ====== RESET ======
document.addEventListener('click',function(e) {
  if(e.target.id === 'resetBtn' || e.target.closest('#resetBtn')) {
    localStorage.removeItem('xingchen_progress');
    examState = {answers:{},submitted:false,score:0};
    showToast('已重置所有进度','info');
    render();
  }
});

// ====== TOAST ======
function showToast(msg,type) {
  const colors = {success:'bg-emerald-500',error:'bg-red-500',info:'bg-blue-500'};
  const t = document.createElement('div');
  t.className = `fixed top-6 left-1/2 -translate-x-1/2 z-50 ${colors[type]||'bg-white/10'} text-white px-6 py-3 rounded-xl text-sm font-medium shadow-2xl backdrop-blur-lg animate-[slideUp_0.3s_ease-out]`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2500);
}

// Init
examState = {answers:{},submitted:false,score:0};
render();

</script>
